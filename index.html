<div id="background"></div>

<div id="game">

    <div class="stat">🔥 장선: <span id="stat-sun">0</span></div>
    <div class="stat">😈 민기: <span id="stat-minki">0</span></div>
    <div class="stat">📚 학업: <span id="stat-study">0</span></div>

  <img id="char-left" class="character">
  <img id="char-center" class="character">
  <img id="char-right" class="character">

  <div id="dialogue-box">

    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>
