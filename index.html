<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로연시: 로스쿨 연애 시뮬레이션</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
  <div id="status-bar">
    <div class="stat">💖 혜진: <span id="stat-hyejin">0</span></div>
    <div class="stat">🔥 장선: <span id="stat-sun">0</span></div>
    <div class="stat">😈 민기: <span id="stat-minki">0</span></div>
    <div class="stat">📚 학업: <span id="stat-study">0</span></div>
  </div>

  <div id="background"></div>

  <img id="char-left" class="character">
  <img id="char-center" class="character">
  <img id="char-right" class="character">

  <div id="dialogue-box">
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
